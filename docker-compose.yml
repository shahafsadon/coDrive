services:
  cpp-server: 
    # C++ server service
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codrive-cpp-server
    expose:
      # C++ server port (internal)
      - "8080"   

  web:
    # Web server service
    build:
      context: ./web-server
      dockerfile: Dockerfile
    container_name: codrive-web
    environment:
      # C++ service name
      CPP_SERVER_HOST: cpp-server  
      CPP_SERVER_PORT: "8080"
    ports:
      # Web server port (external)
      - "3000:3000"   
    depends_on:
      - cpp-server
