services:
  cpp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpp-server
    ports:
      - "8080:8080"
    volumes:
      - ./articles:/articles
    command: ["8080"]

  web-server:
    build:
      context: ./web-server
    container_name: web-server
    ports:
      - "3000:3000"
    environment:
      CPP_SERVER_HOST: cpp-server
      CPP_SERVER_PORT: 8080
    depends_on:
      - cpp-server

  web-client:
    build:
      context: ./web-client
    container_name: web-client
    ports:
      - "3008:3000"
    depends_on:
      - web-server
